<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CapiTalk241 — L'essentiel du Gabon</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --noir:    #0a0a0a;
  --terre:   #1c1410;
  --or:      #c9963a;
  --or-pale: #e8c97a;
  --ocre:    #8b5e1a;
  --foret:   #1a3d2b;
  --foret2:  #2d6645;
  --sable:   #f2e8d5;
  --sable2:  #e8d9bc;
  --ivoire:  #faf6ee;
  --muted:   #8a7d6a;
  --card:    #ffffff;
  --intl:    #1e3a5f;
  --intl2:   #2d5a8e;
  --intl-bg: #f0f5fc;
  --radius:  10px;
}

* { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--sable);
  color: var(--noir);
  min-height: 100vh;
  /* Pleine largeur sur desktop, centrée sur mobile */
}

/* ══════════════════════════════════════════
   HERO HEADER
══════════════════════════════════════════ */
.site-header {
  background: var(--terre);
  position: sticky;
  top: 0;
  z-index: 200;
  border-bottom: 3px solid var(--or);
}

.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0 10px;
  border-bottom: 1px solid rgba(201,150,58,0.2);
}

.logo-wrap { display:flex; align-items:baseline; gap:6px; }

.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(26px, 5vw, 38px);
  font-weight: 700;
  color: var(--ivoire);
  letter-spacing: -1px;
  line-height: 1;
}

.logo em {
  color: var(--or);
  font-style: normal;
}

.logo-flag {
  font-size: 18px;
  margin-left: 4px;
}

.logo-sub {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 3px;
  text-transform: uppercase;
  font-family: 'DM Mono', monospace;
  margin-left: 2px;
  align-self: flex-end;
  margin-bottom: 4px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.date-pill {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.stats-pills { display:flex; gap:6px; }

.pill {
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  font-family: 'DM Mono', monospace;
}
.pill-gabon { background:var(--or); color:var(--terre); }
.pill-intl  { background:var(--intl2); color:white; }

/* Tagline */
.header-tagline {
  padding: 8px 0;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 16px;
}

.tagline-sep {
  flex: 1;
  height: 1px;
  background: rgba(201,150,58,0.15);
}

/* ══════════════════════════════════════════
   NAV TABS + CHIPS
══════════════════════════════════════════ */
.nav-bar {
  background: var(--noir);
  border-bottom: 1px solid #1a1a1a;
}

.nav-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 0;
}

.view-tab {
  padding: 12px 20px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: #555;
  cursor: pointer;
  border: none;
  background: transparent;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
}

.view-tab.active-gabon { color: var(--or); border-bottom-color: var(--or); }
.view-tab.active-intl  { color: #6a9fd4; border-bottom-color: var(--intl2); }
.view-tab.active-all   { color: #aaa;    border-bottom-color: #444; }

.nav-sep { width:1px; height:20px; background:#222; margin: 0 4px; }

.chips-wrap {
  flex: 1;
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  padding: 0 0 0 8px;
}
.chips-wrap::-webkit-scrollbar { display:none; }

.chip {
  flex-shrink: 0;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid #2a2a2a;
  color: #555;
  background: transparent;
  letter-spacing: 0.3px;
  transition: all 0.15s;
  white-space: nowrap;
}
.chip.active-gabon { background:var(--or); border-color:var(--or); color:var(--terre); }
.chip.active-intl  { background:var(--intl2); border-color:var(--intl2); color:white; }
.chip:hover:not(.active-gabon):not(.active-intl) { border-color:#444; color:#999; }

/* ══════════════════════════════════════════
   LOADING BAR (top of page)
══════════════════════════════════════════ */
.loading-bar {
  height: 3px;
  background: var(--terre);
  position: fixed;
  top: 0;
  left: 0;
  width: 0%;
  z-index: 999;
  transition: width 0.3s ease;
}
.loading-bar.active { background: var(--or); }

/* ══════════════════════════════════════════
   REFRESH BTN (petit, discret, coin haut droit)
══════════════════════════════════════════ */
.refresh-btn {
  background: rgba(201,150,58,0.15);
  border: 1px solid rgba(201,150,58,0.3);
  color: var(--or-pale);
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: all 0.2s;
  white-space: nowrap;
}
.refresh-btn:hover { background: rgba(201,150,58,0.25); }
.refresh-btn:disabled { opacity:0.5; cursor:not-allowed; }

.spinner {
  width:11px; height:11px;
  border: 2px solid rgba(201,150,58,0.3);
  border-top-color: var(--or);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ══════════════════════════════════════════
   MAIN LAYOUT
══════════════════════════════════════════ */
.main-content {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px 24px 60px;
}

/* Grid responsive : 1 col mobile, 2 col tablette, 3 col desktop */
.articles-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
  align-items: start;
}

/* Section divider */
.section-head {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 0 4px;
  margin-bottom: 4px;
}

.section-line {
  flex: 1;
  height: 1px;
}
.section-line.gabon-line { background: linear-gradient(to right, var(--or), transparent); }
.section-line.intl-line  { background: linear-gradient(to right, var(--intl2), transparent); }

.section-label-text {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  font-weight: 500;
}
.gabon-label { color: var(--or); }
.intl-label  { color: var(--intl2); }

.section-count-badge {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
}
.gabon-badge { background: rgba(201,150,58,0.15); color: var(--or); }
.intl-badge  { background: rgba(45,90,142,0.15);  color: var(--intl2); }

/* ══════════════════════════════════════════
   ARTICLE CARDS
══════════════════════════════════════════ */
.article-card {
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--sable2);
  animation: riseIn 0.4s ease both;
  transition: transform 0.2s, box-shadow 0.2s;
  display: flex;
  flex-direction: column;
}

.article-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.1);
}

.article-card.intl-card {
  border-color: #dce8f5;
  background: var(--intl-bg);
}

@keyframes riseIn {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}

/* Card top stripe */
.card-stripe {
  height: 3px;
  background: var(--or);
}
.intl-card .card-stripe { background: var(--intl2); }

/* Card header */
.card-header {
  padding: 10px 14px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #f0ece4;
}
.intl-card .card-header { border-bottom-color: #e2ecf7; }

.card-source {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 500;
}
.card-source.gabon-source { color: var(--ocre); }
.card-source.intl-source  { color: var(--intl2); }

.card-time {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: #bbb;
}

.intl-badge-small {
  background: var(--intl2);
  color: white;
  font-size: 8px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 8px;
  letter-spacing: 0.5px;
  margin-right: 4px;
}

/* Card body */
.card-body { padding: 12px 14px 0; flex: 1; }

.card-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 600;
  line-height: 1.3;
  color: var(--terre);
  margin-bottom: 10px;
  letter-spacing: -0.2px;
}

.intl-card .card-title { color: var(--intl); }

/* Résumé CapiTalk241 box */
.summary-box {
  border-radius: 6px;
  padding: 10px 12px;
  margin-bottom: 12px;
  font-size: 12.5px;
  line-height: 1.7;
  color: #3a3028;
}

.summary-box.gabon-summary {
  background: linear-gradient(135deg, #fdf8ef, #f7f0e0);
  border-left: 3px solid var(--or);
}

.summary-box.intl-summary {
  background: linear-gradient(135deg, #f0f5fc, #e8f0fa);
  border-left: 3px solid var(--intl2);
  color: #1e2d3d;
}

.summary-label {
  font-family: 'DM Mono', monospace;
  font-size: 8.5px;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 5px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.gabon-summary .summary-label { color: var(--or); }
.intl-summary  .summary-label { color: var(--intl2); }

.summary-label::before {
  content: '';
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: currentColor;
  display: inline-block;
}

/* Card footer */
.card-footer {
  padding: 10px 14px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid #f0ece4;
  margin-top: auto;
}
.intl-card .card-footer { border-top-color: #e2ecf7; }

.cat-pill {
  font-size: 10px;
  font-weight: 500;
  padding: 3px 9px;
  border-radius: 20px;
  background: var(--sable2);
  color: var(--muted);
  letter-spacing: 0.2px;
}

.read-btn {
  font-size: 11px;
  font-weight: 600;
  background: none;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 0;
  letter-spacing: 0.3px;
  transition: gap 0.15s;
}
.read-btn:hover { gap: 7px; }
.gabon-read { color: var(--ocre); }
.intl-read  { color: var(--intl2); }

/* ══════════════════════════════════════════
   SKELETON LOADING
══════════════════════════════════════════ */
.skeleton {
  background: linear-gradient(90deg, #ede8df 25%, #e3ddd4 50%, #ede8df 75%);
  background-size: 200% 100%;
  animation: shimmer 1.3s infinite;
  border-radius: 4px;
}
@keyframes shimmer { from{background-position:200% 0} to{background-position:-200% 0} }

.skel-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px;
  border: 1px solid var(--sable2);
  height: 200px;
}

/* ══════════════════════════════════════════
   ÉTAT VIDE / CHARGEMENT INITIAL
══════════════════════════════════════════ */
.loading-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 80px 20px;
  color: var(--muted);
}

.loading-emblem {
  font-size: 52px;
  margin-bottom: 16px;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.loading-state h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  color: var(--terre);
  margin-bottom: 8px;
}

.loading-state p { font-size: 13px; line-height: 1.6; }

.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.empty-state h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  color: var(--terre);
  margin-bottom: 6px;
}

/* ══════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════ */
@media (max-width: 640px) {
  .header-inner { padding: 0 16px; }
  .logo-sub { display: none; }
  .date-pill { display: none; }
  .main-content { padding: 16px 16px 60px; }
  .articles-grid { grid-template-columns: 1fr; gap: 12px; }
  .nav-inner { padding: 0 16px; }
  .view-tab { padding: 10px 14px; font-size: 11px; }
}

@media (min-width: 641px) and (max-width: 1024px) {
  .articles-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (min-width: 1025px) {
  .articles-grid { grid-template-columns: repeat(3, 1fr); }
}

/* ══════════════════════════════════════════
   MOTIF DE FOND SUBTIL (fibres de bois gabonais)
══════════════════════════════════════════ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    repeating-linear-gradient(
      92deg,
      transparent,
      transparent 40px,
      rgba(139,94,26,0.025) 40px,
      rgba(139,94,26,0.025) 41px
    );
  pointer-events: none;
  z-index: 0;
}

.site-header, .nav-bar, .main-content { position: relative; z-index: 1; }

/* ══════════════════════════════════════════
   TOAST NOTIFICATION
══════════════════════════════════════════ */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--terre);
  color: var(--or-pale);
  padding: 10px 20px;
  border-radius: 30px;
  font-size: 12px;
  font-weight: 500;
  border: 1px solid rgba(201,150,58,0.3);
  z-index: 500;
  transition: transform 0.3s ease;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* Barre dorée décorative en bas */
.footer-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(to right, var(--foret), var(--or), var(--foret));
  z-index: 100;
}
</style>
</head>
<body>

<div class="loading-bar" id="loading-bar"></div>

<!-- ══ HEADER ══════════════════════════════════════ -->
<header class="site-header">
  <div class="header-inner">
    <div class="header-top">
      <div class="logo-wrap">
        <div class="logo">Capi<em>Talk</em><span class="logo-flag">241</span></div>
        <div class="logo-sub">Gabon · Infos</div>
      </div>
      <div class="header-right">
        <div class="date-pill" id="current-date">—</div>
        <div class="stats-pills">
          <span class="pill pill-gabon" id="pill-gabon" title="Articles gabonais">—</span>
          <span class="pill pill-intl"  id="pill-intl"  title="Articles internationaux">—</span>
        </div>
        <button class="refresh-btn" id="refresh-btn" onclick="fetchNews(true)">
          <span id="refresh-icon">↻</span> Actualiser
        </button>
      </div>
    </div>
    <div class="header-tagline">
      <span>Ce qui est capital pour le Gabon</span>
      <span class="tagline-sep"></span>
      <span>Résumés IA · Mis à jour toutes les heures</span>
    </div>
  </div>
</header>

<!-- ══ NAV ═════════════════════════════════════════ -->
<div class="nav-bar">
  <div class="nav-inner">
    <button class="view-tab active-gabon" onclick="switchView('gabon',this)">🇬🇦 Gabon</button>
    <button class="view-tab" onclick="switchView('international',this)">🌍 International</button>
    <button class="view-tab" onclick="switchView('all',this)">⚡ Tout</button>
    <div class="nav-sep"></div>
    <div class="chips-wrap" id="source-chips"></div>
  </div>
</div>

<!-- ══ CONTENU ══════════════════════════════════════ -->
<main class="main-content">
  <div class="articles-grid" id="articles-grid">
    <div class="loading-state">
      <div class="loading-emblem">🌿</div>
      <h3>Chargement des actualités…</h3>
      <p>CapiTalk241 récupère les dernières infos gabonaises</p>
    </div>
  </div>
</main>

<div class="footer-bar"></div>
<div class="toast" id="toast"></div>

<script>
// ══ CONFIG ══════════════════════════════════════════
const BACKEND = 'https://capitalk241-backend.onrender.com/news';

const GABON_SOURCES = [
  {id:'gabonmediatime', label:'Gabon Media Time'},
  {id:'gabonreview',    label:'Gabon Review'},
  {id:'gabonactu',      label:'Gabon Actu'},
];

const INTL_SOURCES = [
  {id:'rfi',             label:'RFI'},
  {id:'france24',        label:'France 24'},
  {id:'jeuneafrique',    label:'Jeune Afrique'},
  {id:'bbc_afrique',     label:'BBC Afrique'},
  {id:'lemonde_afrique', label:'Le Monde'},
  {id:'brut_afrique',    label:'Brut Afrique'},
];

// ══ STATE ════════════════════════════════════════════
let currentView  = 'gabon';
let activeSource = 'all';
let allData      = { gabon: [], international: [], all: [] };
let isLoading    = false;

// ══ DATE ═════════════════════════════════════════════
document.getElementById('current-date').textContent =
  new Date().toLocaleDateString('fr-FR', {weekday:'short', day:'numeric', month:'long'}).toUpperCase();

// ══ TOAST ════════════════════════════════════════════
function showToast(msg, duration=3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ══ LOADING BAR ══════════════════════════════════════
function setLoadingBar(pct) {
  const bar = document.getElementById('loading-bar');
  bar.style.width = pct + '%';
  bar.classList.toggle('active', pct > 0 && pct < 100);
  if (pct >= 100) setTimeout(() => { bar.style.width = '0%'; }, 400);
}

// ══ FETCH ════════════════════════════════════════════
async function fetchNews(manual = false) {
  if (isLoading) return;
  isLoading = true;

  const btn = document.getElementById('refresh-btn');
  const icon = document.getElementById('refresh-icon');
  btn.disabled = true;
  icon.innerHTML = '<div class="spinner"></div>';
  setLoadingBar(20);

  // Skeletons
  if (!allData.all.length || manual) {
    showSkeletons();
  }

  setLoadingBar(50);

  try {
    const resp = await fetch(BACKEND);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const json = await resp.json();

    allData.gabon         = json.articles.filter(a => a.source_type === 'gabon');
    allData.international = json.articles.filter(a => a.source_type === 'international');
    allData.all           = json.articles;

    document.getElementById('pill-gabon').textContent = allData.gabon.length;
    document.getElementById('pill-intl').textContent  = allData.international.length;

    setLoadingBar(100);
    if (manual) showToast(`✓ ${allData.all.length} articles chargés`);

  } catch (err) {
    console.warn('Backend inaccessible:', err.message);
    setLoadingBar(0);
    if (manual) showToast('⚠ Impossible de contacter le serveur');
  }

  btn.disabled = false;
  icon.textContent = '↻';
  isLoading = false;

  renderChips();
  renderArticles();
}

// ══ SKELETONS ════════════════════════════════════════
function showSkeletons() {
  const grid = document.getElementById('articles-grid');
  grid.innerHTML = Array(6).fill(0).map(() => `
    <div class="skel-card">
      <div class="skeleton" style="height:10px;width:35%;margin-bottom:14px"></div>
      <div class="skeleton" style="height:22px;width:90%;margin-bottom:8px"></div>
      <div class="skeleton" style="height:22px;width:65%;margin-bottom:16px"></div>
      <div class="skeleton" style="height:70px;width:100%;margin-bottom:12px"></div>
      <div class="skeleton" style="height:10px;width:40%"></div>
    </div>`).join('');
}

// ══ VIEW SWITCH ══════════════════════════════════════
function switchView(view, btn) {
  currentView  = view;
  activeSource = 'all';
  document.querySelectorAll('.view-tab').forEach(t =>
    t.classList.remove('active-gabon','active-intl','active-all'));
  btn.classList.add(`active-${view}`);
  renderChips();
  renderArticles();
}

// ══ CHIPS ════════════════════════════════════════════
function renderChips() {
  const wrap = document.getElementById('source-chips');
  const sources = currentView === 'gabon'
    ? GABON_SOURCES
    : currentView === 'international'
      ? INTL_SOURCES
      : [...GABON_SOURCES, ...INTL_SOURCES];

  const type = currentView === 'international' ? 'intl' : 'gabon';

  wrap.innerHTML =
    `<button class="chip ${activeSource==='all'?`active-${type}`:''}" onclick="filterSource('all')">Tous</button>` +
    sources.map(s =>
      `<button class="chip ${activeSource===s.id?`active-${type}`:''}" onclick="filterSource('${s.id}')">${s.label}</button>`
    ).join('');
}

function filterSource(id) {
  activeSource = id;
  renderChips();
  renderArticles();
}

// ══ RENDER ═══════════════════════════════════════════
function renderArticles() {
  const grid = document.getElementById('articles-grid');

  let articles = currentView === 'all'
    ? allData.all
    : (allData[currentView] || []);

  if (activeSource !== 'all')
    articles = articles.filter(a => a.source_id === activeSource);

  if (!articles.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <div style="font-size:40px;margin-bottom:12px;opacity:.4">📭</div>
        <h3>Aucun article disponible</h3>
        <p style="font-size:13px;margin-top:6px">Aucun contenu pour ce filtre en ce moment.</p>
      </div>`;
    return;
  }

  if (currentView === 'all') {
    const gab  = articles.filter(a => a.source_type === 'gabon');
    const intl = articles.filter(a => a.source_type === 'international');
    grid.innerHTML =
      (gab.length  ? sectionHtml('gabon', '🇬🇦 Presse gabonaise', gab)          : '') +
      (intl.length ? sectionHtml('intl',  '🌍 Regards internationaux', intl) : '');
    return;
  }

  grid.innerHTML = articles.map((a, i) => cardHtml(a, i)).join('');
}

function sectionHtml(type, label, articles) {
  return `
    <div class="section-head">
      <span class="section-label-text ${type}-label">${label}</span>
      <span class="section-count-badge ${type}-badge">${articles.length}</span>
      <div class="section-line ${type}-line"></div>
    </div>
    ${articles.map((a, i) => cardHtml(a, i)).join('')}`;
}

function cardHtml(a, i) {
  const isIntl  = a.source_type === 'international';
  const delay   = `animation-delay:${i * 0.06}s`;
  const srcCls  = isIntl ? 'intl-source' : 'gabon-source';
  const sumCls  = isIntl ? 'intl-summary' : 'gabon-summary';
  const readCls = isIntl ? 'intl-read' : 'gabon-read';
  const safeUrl = (a.url || '#').replace(/'/g, '%27');

  return `
  <div class="article-card ${isIntl?'intl-card':''}" style="${delay}">
    <div class="card-stripe"></div>
    <div class="card-header">
      <span class="card-source ${srcCls}">
        ${isIntl ? '<span class="intl-badge-small">INTL</span>' : ''}${a.source_name}
      </span>
      <span class="card-time">${a.time_ago || a.time || 'Récent'}</span>
    </div>
    <div class="card-body">
      <div class="card-title">${a.title}</div>
      <div class="summary-box ${sumCls}">
        <div class="summary-label">Résumé CapiTalk241</div>
        ${a.ai_summary || '—'}
      </div>
    </div>
    <div class="card-footer">
      <span class="cat-pill">${a.category || 'Actualité'}</span>
      <button class="read-btn ${readCls}" onclick="window.open('${safeUrl}','_blank')">
        Lire l'article →
      </button>
    </div>
  </div>`;
}

// ══ AUTO-REFRESH toutes les 60 min ═══════════════════
setInterval(() => fetchNews(false), 60 * 60 * 1000);

// ══ DÉMARRAGE AUTOMATIQUE ════════════════════════════
fetchNews(false);
</script>
</body>
</html>
